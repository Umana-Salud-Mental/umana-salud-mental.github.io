name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - copilot/update-recursos-section-design
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Push site files to pages source branch
        run: |
          # Get the current branch name
          CURRENT_BRANCH="${GITHUB_REF_NAME}"
          echo "Deploying from branch: $CURRENT_BRANCH"

          # Create a temporary directory with the site files
          TMPDIR=$(mktemp -d)
          # Copy all site files (exclude .git, .github)
          rsync -av --exclude='.git' --exclude='.github' . "$TMPDIR/"

          # Checkout or create the pages source branch
          git fetch origin copilot/add-landing-page-es || true
          git checkout -B deploy-pages origin/copilot/add-landing-page-es 2>/dev/null || git checkout -B deploy-pages

          # Copy the updated files
          rsync -av --exclude='.git' --exclude='.github' "$TMPDIR/" .

          # Commit and push
          git add -A
          git diff --cached --quiet || git commit -m "deploy: sync from $CURRENT_BRANCH [skip ci]"
          git push origin deploy-pages:copilot/add-landing-page-es --force
          echo "Successfully deployed to copilot/add-landing-page-es"

